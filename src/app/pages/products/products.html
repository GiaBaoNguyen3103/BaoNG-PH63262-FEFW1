<div class="container" style="padding: 20px">
  <h2>Danh sách sản phẩm</h2>

  <div class="product-grid" style="display: flex; gap: 20px; flex-wrap: wrap">
    @for (product of productList; track product.id) {
      <div
        class="product-card"
        style="
          border: 1px solid #ccc;
          padding: 15px;
          width: 250px;
          border-radius: 8px;
        "
      >
        <img
          [src]="product.img"
          alt="{{ product.name }}"
          style="width: 100%; height: 150px; object-fit: cover"
        />
        <h3>{{ product.name }}</h3>
        <p style="color: red; font-weight: bold">
          Giá: {{ product.price | number }} đ
        </p>
        <p style="font-size: 14px; color: #555">{{ product.description }}</p>
        <button class="btn btn-danger btn-lg fw-bold shadow-sm px-4 py-2">
          MUA NGAY
        </button>
      </div>
    } @empty {
      <p>Đang tải dữ liệu hoặc không có sản phẩm nào...</p>
    }
  </div>
</div>
